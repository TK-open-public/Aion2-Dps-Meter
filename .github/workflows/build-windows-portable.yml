name: Build Windows Portable

on:
  workflow_dispatch:
  push:
    branches:
      - codex/improvements-all

jobs:
  build-portable:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle 8.8
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.8"

      - name: Build portable app
        shell: pwsh
        run: gradle.bat createDistributable --no-daemon --stacktrace

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: aion2meter4j-portable-win
          path: |
            build/compose/binaries/main/app/**
          if-no-files-found: error
          retention-days: 14
