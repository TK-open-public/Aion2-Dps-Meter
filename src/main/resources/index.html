<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1" />
    <title>DPS</title>
    <link
      href="styles.css"
      rel="stylesheet"
      type="text/css" />
  </head>

  <body>
    <div class="container">
      <div class="meter">
        <div class="header">
          <div class="bossIcon">
            <img src="./assets/logo.png" />
          </div>
          <div class="bossNames">
            <span class="bossName"></span>
          </div>

          <div class="headerBtns">
            <div class="headerBtn historyBtn" title="전투 기록">
              <span class="headerBtnIcon">🗂</span>
            </div>
            <div class="headerBtn settingsBtn" title="설정">
              <span class="headerBtnIcon">⚙</span>
            </div>
            <div class="headerBtn resetBtn" title="초기화">
              <span class="headerBtnIcon">↺</span>
            </div>
            <div class="headerBtn collapseBtn">
              <span
                class="collapseIcon headerBtnIcon"
                title="접기/펼치기">▴</span>
            </div>
          </div>
        </div>
        <div
          class="settingsPanel"
          role="dialog"
          aria-modal="true">
          <div class="settingsHeader">
            <div class="settingsTitle">설정</div>
            <div class="closeX settingsClose">×</div>
          </div>
          <div class="settingsBody">
            <div class="settingsRow">
              <div class="settingsLabel">리셋 단축키</div>
              <input
                class="settingsInput"
                type="text"
                placeholder="단축키를 입력하세요"
                readonly />
              <div class="settingsHint">Ctrl/Alt 조합만 사용 가능합니다</div>
            </div>
            <div class="settingsRow">
              <div class="settingsLabel">전투기록 보관</div>
              <select class="settingsSelect settingsHistoryRetention">
                <option value="on_exit_delete">프로그램 종료시 삭제</option>
                <option value="permanent">영구 보관</option>
              </select>
              <div class="settingsHint">영구 보관 시 다음 실행에도 전투기록과 상세 로그가 유지됩니다.</div>
            </div>
          </div>
          <div class="settingsFooter">
            <button class="settingsBtnPrimary settingsSave">저장</button>
          </div>
        </div>
        <div
          class="historyPanel"
          role="dialog"
          aria-modal="true">
          <div class="historyHeader">
            <div class="historyTitle">전투 기록</div>
            <div class="closeX historyClose">×</div>
          </div>
          <div class="historyBody">
            <div class="historyHint">
              미터기를 켜둔 동안 완료된 보스 전투 기록입니다.
            </div>
            <div class="historyList"></div>
          </div>
          <div class="historyFooter">
            <button class="historyBtnPrimary historyRefresh">새로고침</button>
          </div>
        </div>
        <div
          class="detailsPanel"
          role="dialog"
          aria-modal="true">
          <div class="detailsHeader">
            <div class="detailsTitle">상세</div>
            <div class="tooltip">
              지속 피해의 타격횟수는 총합 치명타, 강타, 완벽, 백어택, 막기 비율에 포함되지 않습니다.
            </div>

            <div class="closeX detailsClose">×</div>
          </div>

          <div class="detailsBody">
            <div class="detailsStats"></div>

            <div class="detailsSkills">
              <div class="skillHeader">
                <div class="cell name center">스킬명</div>
                <div class="cell center hit">타격횟수</div>
                <div class="cell center crit">치명타</div>
                <div class="cell center parry">패리</div>
                <div class="cell center perfect">완벽</div>
                <div class="cell center double">강타</div>
                <div class="cell center back">백어택</div>
                <div class="cell dmg">누적 피해량</div>
              </div>

              <div class="skills"></div>
            </div>
          </div>
        </div>
        <div class="list"></div>
        <div class="battleTime">
          <div class="status"></div>
          <div class="tick"></div>
        </div>
      </div>
      <div
        class="console"
        style="
          position: fixed;
          bottom: 0;
          left: 0;
          right: 0;
          background: rgba(0, 0, 0, 0.8);
          color: lime;
          font-family: monospace;
          font-size: 12px;
          padding: 10px;
          max-height: 200px;
          overflow-y: auto;
          display: none;
        "></div>
    </div>
    <div
      class="updateModal"
      id="updateModal">
      <div class="updateModalCard">
        <div class="updateModalTitle">신규 업데이트</div>
        <div
          class="updateModalText"
          id="updateModalText"></div>
        <div class="updateModalActions">
          <button class="updateModalBtn primary">확인</button>
          <button class="updateModalBtn secondary">취소</button>
        </div>
      </div>
    </div>
    <script src="./js/battleTime.js"></script>
    <script src="./js/meter.js"></script>
    <script src="./js/details.js"></script>

    <script src="./js/checkRelease.js"></script>
    <script src="./js/settings.js"></script>

    <script src="./js/core.js"></script>
    <script>
      dpsApp.start();
    </script>
  </body>
</html>
